<script>
const CARDS = [{"id": 1, "topic": "01 Java Concurrency", "q": "Race condition vs Deadlock khác nhau thế nào, phát hiện ra sao?", "a": "Race condition: nhiều thread cùng đọc/ghi shared state không đồng bộ → kết quả sai (vd lost update khi trừ tiền). Deadlock: 2+ thread chờ khoá của nhau vòng tròn → treo. Phát hiện: race qua kết quả không nhất quán/test concurrent; deadlock qua thread dump (BLOCKED, 'waiting to lock').", "tags": "concurrency"}, {"id": 2, "topic": "01 Java Concurrency", "q": "ThreadPoolExecutor: khi nào tạo thread mới? Vì sao newFixedThreadPool nguy hiểm?", "a": "Thứ tự: corePoolSize đầy → vào queue → queue đầy mới tạo tới maxPoolSize → đầy nữa thì rejectedHandler. Tức thread mới KHÔNG tạo khi queue chưa đầy. newFixedThreadPool dùng LinkedBlockingQueue unbounded → queue không bao giờ đầy → OOM thay vì reject, max không bao giờ tới.", "tags": "concurrency"}, {"id": 3, "topic": "01 Java Concurrency", "q": "volatile vs synchronized vs AtomicInteger — chọn cái nào khi nào?", "a": "volatile: chỉ đảm bảo visibility, KHÔNG atomic (count++ vẫn sai) → dùng cho cờ trạng thái. synchronized: vừa visibility vừa mutual exclusion nhưng chậm (lock). AtomicInteger: atomic qua CAS, nhanh hơn lock khi contention vừa phải → counter.", "tags": "concurrency"}, {"id": 4, "topic": "01 Java Concurrency", "q": "Vì sao synchronized không đủ để chống double-payment trong production?", "a": "synchronized chỉ khoá trong 1 JVM. Production chạy multi-instance → 2 instance cùng xử lý 1 request vẫn lọt. Stack đúng: idempotency key + DB pessimistic lock (1 service) → distributed lock/Redlock (nhiều instance) → Saga (cross-service).", "tags": "concurrency"}, {"id": 5, "topic": "01 Java Concurrency", "q": "thenApply vs thenApplyAsync trong CompletableFuture?", "a": "thenApply: chạy callback trên thread vừa hoàn thành stage trước (có thể là thread caller hoặc pool). thenApplyAsync: chạy trên ForkJoinPool.commonPool (hoặc executor chỉ định) → tách khỏi thread trước, kiểm soát được pool, tránh chiếm thread không mong muốn.", "tags": "concurrency"}, {"id": 6, "topic": "01 Java Concurrency", "q": "Gọi 3 service song song, 1 fail không được kéo sập cả request — làm sao?", "a": "Mỗi call là 1 CompletableFuture với .orTimeout(...) riêng và .exceptionally(...) trả fallback. allOf() chờ tất cả; vì mỗi future đã handle lỗi cục bộ nên 1 service fail chỉ làm phần đó fallback, không propagate fail toàn bộ.", "tags": "concurrency"}, {"id": 7, "topic": "03 Java 8-17", "q": "Vì sao stream().filter().map() không chạy gì cho tới collect()?", "a": "Stream là lazy: các intermediate op (filter/map) chỉ ghi nhận pipeline, chỉ chạy khi gặp terminal op (collect/forEach/reduce). Nhờ vậy limit(10) sau filter chỉ xử lý đủ phần tử cần, không quét hết.", "tags": "java"}, {"id": 8, "topic": "03 Java 8-17", "q": "orElse vs orElseGet khác nhau ra sao, khi nào sai?", "a": "orElse(x): x LUÔN được tính dù Optional có giá trị. orElseGet(supplier): supplier chỉ chạy khi rỗng. Dùng orElse với biểu thức tốn kém (query DB, new object) = lãng phí/bug → dùng orElseGet.", "tags": "java"}, {"id": 9, "topic": "03 Java 8-17", "q": "3 nơi KHÔNG nên dùng Optional?", "a": "Tham số method (dùng overload/null check), field của class/JPA entity (không serialize tốt, tốn bộ nhớ), và phần tử trong collection (dùng collection rỗng thay vì Optional). Optional dành cho return type của method có thể không có kết quả.", "tags": "java"}, {"id": 10, "topic": "03 Java 8-17", "q": "Vì sao không dùng Record cho JPA Entity?", "a": "Record là immutable, không có no-arg constructor, field final → Hibernate cần mutable + proxy + no-arg constructor để hoạt động. Record hợp cho DTO/value object, không cho entity.", "tags": "java"}, {"id": 11, "topic": "03 Java 8-17", "q": "Sealed class + pattern matching cho lợi ích gì?", "a": "sealed giới hạn tập con cho phép (permits). switch trên sealed type là exhaustive → compiler bắt buộc xử lý hết case, thêm subtype mới mà quên handle là lỗi biên dịch. Tốt cho mô hình hoá trạng thái (Success/Failure/Pending).", "tags": "java"}, {"id": 12, "topic": "03 Java 8-17", "q": "parallelStream rủi ro gì trong service banking?", "a": "Mặc định dùng ForkJoinPool.commonPool dùng chung toàn JVM → 1 task chậm/IO-bound làm nghẽn task khác. IO-bound thường chậm hơn sequential. Trong web service nên tránh, hoặc cấp executor riêng.", "tags": "java"}, {"id": 13, "topic": "04 Java Memory Model", "q": "Vì sao thread khác có thể thấy isSent=true nhưng transactionId=null?", "a": "Không có happens-before, CPU cache + instruction reordering cho phép ghi transactionId và isSent bị sắp xếp lại / chưa flush sang thread kia. volatile trên isSent tạo happens-before + transitivity: mọi ghi trước nó (transactionId) thành visible khi đọc thấy isSent=true.", "tags": "jmm"}, {"id": 14, "topic": "04 Java Memory Model", "q": "Kể 4 happens-before rules quan trọng.", "a": "Program order (trong 1 thread), Monitor lock (unlock hb lock cùng monitor), Volatile (write hb read sau đó), Thread start/join (start() hb mọi thứ trong thread; mọi thứ trong thread hb join() trả về). Cộng tính bắc cầu (transitivity).", "tags": "jmm"}, {"id": 15, "topic": "04 Java Memory Model", "q": "Double-checked locking vì sao BẮT BUỘC volatile?", "a": "Khởi tạo object gồm: cấp phát, gọi constructor, gán reference — có thể bị reorder để gán reference TRƯỚC khi constructor xong. Thread B đọc reference != null nhưng object chưa khởi tạo đủ → lỗi. volatile chặn reorder này. Alternative sạch hơn: Initialization-on-demand holder.", "tags": "jmm"}, {"id": 16, "topic": "04 Java Memory Model", "q": "volatile có làm count++ thành an toàn không?", "a": "Không. volatile chỉ bảo đảm visibility, không atomicity. count++ là read-modify-write 3 bước → vẫn lost update. Cần AtomicInteger (CAS) hoặc synchronized.", "tags": "jmm"}, {"id": 17, "topic": "04 Java Memory Model", "q": "4 cách safe publication một object giữa các thread?", "a": "Khởi tạo qua static initializer; gán vào volatile field; gán vào final field (publish qua constructor đúng); đặt vào concurrent collection (ConcurrentHashMap...). Publish qua field non-volatile non-final là unsafe.", "tags": "jmm"}, {"id": 18, "topic": "05 Spring Core", "q": "Vì sao mutable field trong @Service singleton là bug?", "a": "Singleton dùng chung 1 instance cho mọi request/thread → field mutable bị nhiều thread ghi đè (race) và rò dữ liệu request này sang request khác. Fix: stateless service, dùng biến local trong method.", "tags": "spring"}, {"id": 19, "topic": "05 Spring Core", "q": "@Transactional trên method private có hoạt động không? Vì sao?", "a": "Không. @Transactional dựa trên AOP proxy (CGLIB/JDK); proxy không thể override method private/final, và self-invocation (gọi this.method()) bỏ qua proxy. 3 điều kiện chết: private, final, self-invocation.", "tags": "spring"}, {"id": 20, "topic": "05 Spring Core", "q": "Self-invocation phá @Transactional/@Cacheable — fix thế nào?", "a": "Gọi nội bộ this.method() không đi qua proxy nên advice không chạy. Fix: tách method sang bean khác (inject vào), hoặc self-inject (@Lazy chính nó / ApplicationContext.getBean), hoặc AopContext.currentProxy().", "tags": "spring"}, {"id": 21, "topic": "05 Spring Core", "q": "AOP proxy được tạo ở bước nào trong bean lifecycle?", "a": "Sau khi instantiate + populate dependencies + init (BeanPostProcessor postProcessAfterInitialization) → proxy bọc bean. Vì vậy bên trong constructor/@PostConstruct của chính bean, proxy chưa sẵn sàng → self-invocation không có advice.", "tags": "spring"}, {"id": 22, "topic": "05 Spring Core", "q": "Inject prototype bean vào singleton: sao mỗi lần không ra instance mới?", "a": "Dependency được resolve 1 lần lúc tạo singleton → giữ mãi 1 prototype instance. Muốn mỗi lần mới: dùng ObjectProvider/Provider<T>.get(), @Lookup method, hoặc context.getBean() mỗi lần dùng.", "tags": "spring"}, {"id": 23, "topic": "07 Spring Transaction", "q": "Vì sao chuyển tiền cần REPEATABLE_READ + SELECT FOR UPDATE, không chỉ REPEATABLE_READ?", "a": "REPEATABLE_READ chống non-repeatable read nhưng 2 TX vẫn có thể cùng đọc balance cũ rồi cùng trừ → lost update/write skew. SELECT FOR UPDATE đặt khoá ghi trên row → TX thứ hai chờ, đảm bảo đọc-rồi-ghi tuần tự.", "tags": "transaction"}, {"id": 24, "topic": "07 Spring Transaction", "q": "REQUIRED vs REQUIRES_NEW — vì sao audit log dùng REQUIRES_NEW?", "a": "REQUIRED: join TX hiện tại → rollback chung. Audit cần ghi lại được KỂ CẢ khi business TX rollback → REQUIRES_NEW chạy TX riêng commit độc lập. Lưu ý: exception trong REQUIRES_NEW không tự lan lên caller vì khác TX.", "tags": "transaction"}, {"id": 25, "topic": "07 Spring Transaction", "q": "Vì sao checked exception không rollback mặc định? Fix?", "a": "Spring mặc định chỉ rollback cho RuntimeException và Error, KHÔNG cho checked exception → bug: ném checked exception mà TX vẫn commit. Fix: @Transactional(rollbackFor = Exception.class) hoặc dùng RuntimeException.", "tags": "transaction"}, {"id": 26, "topic": "07 Spring Transaction", "q": "Publish Kafka event trong @Transactional method nguy hiểm gì?", "a": "Event gửi trước khi TX commit → consumer đọc nhưng nếu TX rollback thì dữ liệu không tồn tại (đọc data ma). Fix: @TransactionalEventListener(phase = AFTER_COMMIT) hoặc Outbox pattern.", "tags": "transaction"}, {"id": 27, "topic": "07 Spring Transaction", "q": "Vì sao @Transactional không hoạt động across 2 microservice?", "a": "TX của Spring gắn với 1 DB connection/datasource cục bộ; không có khoá/atomicity xuyên service qua HTTP. Giải pháp: 2PC (blocking, SPOF) hoặc Saga/Outbox (eventual consistency + compensation).", "tags": "transaction"}, {"id": 28, "topic": "08 Spring Security", "q": "JWT gồm mấy phần? Vì sao payload không được chứa secret?", "a": "3 phần: header.payload.signature, nối bằng base64url. Payload chỉ ENCODE chứ không encrypt → ai cũng decode đọc được. Không để password/PII nhạy cảm. Signature chỉ đảm bảo toàn vẹn, không bảo mật nội dung.", "tags": "security"}, {"id": 29, "topic": "08 Spring Security", "q": "JWT khó logout — 3 cách và trade-off?", "a": "JWT stateless nên không tự thu hồi. (1) TTL ngắn + refresh token: đơn giản, vẫn có cửa sổ hợp lệ. (2) Blacklist token ở Redis tới khi hết hạn: thu hồi ngay nhưng mất tính stateless. (3) Đổi signing key/version: thu hồi hàng loạt, ảnh hưởng tất cả.", "tags": "security"}, {"id": 30, "topic": "08 Spring Security", "q": "Vì sao allowedOrigins('*') + allowCredentials(true) không chạy?", "a": "Chuẩn CORS cấm kết hợp wildcard '*' với credentials. Phải liệt kê origin cụ thể (hoặc allowedOriginPatterns) khi cho gửi cookie/Authorization. CORS là cơ chế của BROWSER, không phải bảo mật phía server.", "tags": "security"}, {"id": 31, "topic": "08 Spring Security", "q": "Vì sao RSA key pair tốt hơn HMAC cho JWT trong microservices?", "a": "HMAC (symmetric): mọi service phải giữ cùng secret để verify → lộ 1 nơi là lộ hết, ký được token giả. RSA (asymmetric): chỉ auth-service giữ private key ký; các service khác chỉ cần public key verify → không ký giả được.", "tags": "security"}, {"id": 32, "topic": "08 Spring Security", "q": "@PreAuthorize vs @PostAuthorize khi nào dùng?", "a": "@PreAuthorize: kiểm tra TRƯỚC khi chạy method (role + tham số). @PostAuthorize: kiểm tra SAU khi có kết quả, dùng khi quyết định phụ thuộc object trả về (vd returnObject.owner == principal). Tách logic vào bean để test được.", "tags": "security"}, {"id": 33, "topic": "09 Spring Data JPA", "q": "N+1 query là gì, 4 cách fix và chọn khi nào?", "a": "1 query load list + N query lazy-load quan hệ. Fix: JOIN FETCH (1 query, không phân trang nhiều collection), @EntityGraph (khai báo attributePaths), @BatchSize (gom IN query, tốt cho nhiều collection), DTO projection (chỉ field cần, nhanh nhất cho read).", "tags": "jpa"}, {"id": 34, "topic": "09 Spring Data JPA", "q": "L1 vs L2 cache của Hibernate?", "a": "L1: scope = session/persistence context, luôn bật, cùng session query lại không hit DB. L2: scope = SessionFactory, tùy chọn, chia sẻ giữa session — nhưng dễ gây stale/data inconsistency với dữ liệu hay đổi (vd balance), chỉ nên cache reference data.", "tags": "jpa"}, {"id": 35, "topic": "09 Spring Data JPA", "q": "Vì sao không cần gọi save() sau khi sửa entity trong @Transactional?", "a": "Dirty checking: Hibernate chụp snapshot lúc load, lúc flush/commit so sánh, khác thì tự sinh UPDATE. Nhược: batch 10K entity → so sánh + UPDATE từng cái rất tốn → dùng batch/bulk update.", "tags": "jpa"}, {"id": 36, "topic": "09 Spring Data JPA", "q": "Optimistic vs Pessimistic lock — chọn khi nào?", "a": "Optimistic (@Version): không khoá, lúc UPDATE thêm WHERE version=? ; 0 row → OptimisticLockException → retry. Hợp khi conflict hiếm. Pessimistic (SELECT FOR UPDATE): khoá ngay, TX khác chờ. Hợp khi conflict thường xuyên/giá trị cao (chuyển tiền).", "tags": "jpa"}, {"id": 37, "topic": "09 Spring Data JPA", "q": "LazyInitializationException xảy ra khi nào, fix?", "a": "Truy cập quan hệ lazy sau khi persistence context/TX đã đóng (vd ở controller). Fix đúng: map sang DTO TRONG service (còn trong TX); không nên mở session ở view (OSIV) hay đổi sang EAGER bừa.", "tags": "jpa"}, {"id": 38, "topic": "09 Spring Data JPA", "q": "JOIN FETCH + pagination cảnh báo gì?", "a": "Hibernate cảnh báo HHH000104 'firstResult/maxResults specified with collection fetch; applying in memory' → load HẾT rồi phân trang trong JVM → OOM. Fix: 2 query (lấy id phân trang trước, rồi fetch theo id) hoặc @BatchSize.", "tags": "jpa"}, {"id": 39, "topic": "11 SQL Advanced", "q": "B-Tree index tìm dữ liệu O(log n) nghĩa là gì thực tế?", "a": "Từ root → internal nodes → leaf, mỗi tầng 1 I/O; cây cao 3-4 tầng cho hàng triệu row → chỉ 3-4 I/O thay vì full scan 50M row. Đó là lý do index biến O(n) thành O(log n).", "tags": "sql"}, {"id": 40, "topic": "11 SQL Advanced", "q": "Leftmost prefix rule: index (a,b,c) phục vụ WHERE nào?", "a": "Phục vụ WHERE a, (a,b), (a,b,c) — phải có tiền tố trái liên tục. WHERE b, WHERE b AND c KHÔNG dùng được index này (thiếu a). Vì index sort theo a trước rồi mới b, c.", "tags": "sql"}, {"id": 41, "topic": "11 SQL Advanced", "q": "Covering index là gì, lợi/hại?", "a": "Index chứa đủ mọi cột query cần (SELECT + WHERE) → 'Index Only Scan', không phải fetch heap/table → rất nhanh. Đánh đổi: tốn storage, làm chậm write (phải maintain index lớn hơn).", "tags": "sql"}, {"id": 42, "topic": "11 SQL Advanced", "q": "Đọc EXPLAIN: 3 red flag thường gặp?", "a": "Seq Scan trên bảng lớn (thiếu index/where không sargable); rows estimated lệch xa actual (stale statistics → cần ANALYZE); Nested Loop với outer rows hàng triệu (nên hash join). Function trên cột indexed cũng làm mất index.", "tags": "sql"}, {"id": 43, "topic": "11 SQL Advanced", "q": "Sắp thứ tự cột trong composite index theo gì?", "a": "Theo cách query (equality trước, range sau) và selectivity. Quy tắc thực dụng: cột dùng equality lên đầu; cột range (date) để cuối. Vd (account_id, status, date) tốt nếu luôn lọc account_id equality.", "tags": "sql"}, {"id": 44, "topic": "13 Distributed Tx", "q": "2PC: 2 phase là gì và 3 điểm yếu?", "a": "Phase 1 Prepare: coordinator hỏi, mỗi service khoá resource + vote READY. Phase 2 Commit/Abort: coordinator ra lệnh. Điểm yếu: coordinator là SPOF; blocking (giữ khoá lâu); rủi ro khi network partition. Ít dùng trong microservices.", "tags": "distributed-tx"}, {"id": 45, "topic": "13 Distributed Tx", "q": "Saga Choreography vs Orchestration?", "a": "Choreography: mỗi service phản ứng với event và phát event tiếp, không trung tâm → decoupled nhưng khó debug, dễ vòng lặp. Orchestration: 1 orchestrator điều phối tuần tự + compensation → dễ debug, state rõ, nhưng coupling tập trung.", "tags": "distributed-tx"}, {"id": 46, "topic": "13 Distributed Tx", "q": "Outbox pattern giải quyết dual-write thế nào?", "a": "Thay vì ghi DB rồi publish Kafka (2 thao tác, có thể lệch), ghi business data + bản ghi outbox TRONG CÙNG transaction (atomic). Một poller riêng đọc outbox chưa publish → đẩy Kafka → đánh dấu đã publish; fail thì retry.", "tags": "distributed-tx"}, {"id": 47, "topic": "13 Distributed Tx", "q": "Compensation transaction là gì, có luôn undo được không?", "a": "Là thao tác đảo ngược 1 bước Saga (debit → credit). KHÔNG phải lúc nào cũng undo được: SMS đã gửi không rút lại — chấp nhận, đánh dấu COMPENSATED + gửi thông báo đính chính, không 'xoá' hành động.", "tags": "distributed-tx"}, {"id": 48, "topic": "13 Distributed Tx", "q": "Exactly-once trong consumer thực hiện bằng gì?", "a": "Kafka là at-least-once → có thể nhận trùng. Consumer phải idempotent: mỗi event có idempotency/event_id, lưu key đã xử lý (DB/Redis), gặp lại thì skip. 'Exactly-once' về mặt hiệu ứng = at-least-once + idempotency.", "tags": "distributed-tx"}, {"id": 49, "topic": "14 Redis", "q": "5 data structure Redis và use case banking?", "a": "String (cache giá trị/JSON), Hash (session/đối tượng nhiều field), List (hàng đợi/audit gần đây), Set (blacklist token, unique), Sorted Set (rate limiting theo time-window, leaderboard).", "tags": "redis"}, {"id": 50, "topic": "14 Redis", "q": "Cache-aside vs write-through vs write-behind?", "a": "Cache-aside: miss → đọc DB → set cache (app quản lý). Write-through: ghi cache + DB đồng bộ (consistency cao, chậm hơn). Write-behind: ghi cache, async ghi DB (nhanh, rủi ro mất dữ liệu nếu crash).", "tags": "redis"}, {"id": 51, "topic": "14 Redis", "q": "Cache penetration / breakdown / avalanche khác nhau và fix?", "a": "Penetration: query key không tồn tại luôn miss → cache cả giá trị null + bloom filter. Breakdown: 1 hot key hết hạn, nhiều request dội DB → mutex/lock rebuild. Avalanche: nhiều key hết hạn cùng lúc → TTL ngẫu nhiên hoá + warm-up.", "tags": "redis"}, {"id": 52, "topic": "14 Redis", "q": "Distributed lock đúng cần gì? Vì sao Lua khi release?", "a": "SET key value(UUID) NX EX ttl (atomic, có owner + TTL). Release phải kiểm tra 'còn là của mình' rồi mới DEL — phải làm atomic bằng Lua (GET==myUUID then DEL) để tránh xoá nhầm lock của tiến trình khác sau khi TTL hết.", "tags": "redis"}, {"id": 53, "topic": "14 Redis", "q": "Redlock vs single-instance lock, vì sao cần majority + fencing token?", "a": "Single node: đơn giản nhưng SPOF. Redlock: acquire trên đa số (3/5) node → chịu được node chết. Fencing token (số tăng dần) chống tình huống lock hết hạn nhưng tiến trình cũ vẫn ghi: resource từ chối token cũ hơn.", "tags": "redis"}, {"id": 54, "topic": "39 DB Consistency", "q": "Vì sao 'CAP chọn 2 trong 3' là cách hiểu sai?", "a": "Partition (P) là điều không tránh được trong hệ phân tán → thực chất là: KHI có partition, chọn C hay A. Không partition thì có cả C lẫn A. PACELC bổ sung: Else (lúc bình thường) chọn Latency hay Consistency.", "tags": "consistency"}, {"id": 55, "topic": "39 DB Consistency", "q": "Vì sao banking chọn PC/EC?", "a": "PC: khi partition ưu tiên Consistency (thà từ chối còn hơn sai số dư). EC: lúc bình thường vẫn ưu tiên Consistency hơn Latency. Tiền sai nguy hiểm hơn chậm/không khả dụng tạm thời.", "tags": "consistency"}, {"id": 56, "topic": "39 DB Consistency", "q": "Write skew là gì, vì sao Snapshot Isolation không chặn được?", "a": "2 TX đọc cùng snapshot, mỗi cái update row KHÁC nhau dựa trên điều kiện chung → cùng hợp lệ riêng lẻ nhưng phá invariant chung (vd 2 bác sĩ cùng xin nghỉ khi cần tối thiểu 1 trực). SI không thấy vì không ghi đè cùng row. Fix: SERIALIZABLE/SSI hoặc SELECT FOR UPDATE.", "tags": "consistency"}, {"id": 57, "topic": "39 DB Consistency", "q": "MVCC: PostgreSQL vs Oracle khác gì, vì sao PG cần VACUUM?", "a": "PG: mỗi update tạo row version mới (xmin/xmax), version cũ nằm trong table → cần VACUUM dọn dead tuples. Oracle: lưu ảnh cũ trong UNDO segment, reconstruct khi cần → không VACUUM nhưng có thể ORA-01555 'snapshot too old' nếu UNDO bị ghi đè.", "tags": "consistency"}, {"id": 58, "topic": "39 DB Consistency", "q": "Vì sao chuyển tiền dùng SELECT FOR UPDATE + lock ordering thay vì retry REPEATABLE_READ?", "a": "FOR UPDATE khoá tường minh, deterministic; lock ordering (luôn khoá account id nhỏ trước) tránh deadlock. Retry trên REPEATABLE_READ tốn vòng lặp và vẫn có thể write skew. Idempotency key phải trong cùng TX để check-then-act atomic.", "tags": "consistency"}, {"id": 59, "topic": "40 Oracle", "q": "Hard parse vs soft parse, vì sao bind variable quan trọng?", "a": "Hard parse: parse + tối ưu plan mới (tốn CPU, latch Shared Pool). Soft parse: tái dùng plan đã cache. Dùng literal khác nhau mỗi query → mỗi câu hard parse + nhồ sơ rác Shared Pool. Bind variable → cùng SQL text → soft parse, tái dùng plan.", "tags": "oracle"}, {"id": 60, "topic": "40 Oracle", "q": "FOR UPDATE SKIP LOCKED dùng cho gì?", "a": "Lấy row chưa bị khoá, bỏ qua row đang khoá → mô hình hàng đợi nhiều worker không tranh nhau cùng job. Khác FOR UPDATE (chờ), NOWAIT (lỗi ngay), WAIT n (chờ n giây).", "tags": "oracle"}, {"id": 61, "topic": "40 Oracle", "q": "Quy trình tune 1 query chậm trên Oracle?", "a": "Execution plan (DBMS_XPLAN.DISPLAY_CURSOR ALLSTATS LAST) → so estimated vs actual rows → wait events/AWR tìm bottleneck → root cause (stale stats? thiếu index? plan sai?) → fix: gather stats / hint / index / partition; verify lại.", "tags": "oracle"}, {"id": 62, "topic": "40 Oracle", "q": "Pagination hiệu quả trên bảng tỷ row — vì sao keyset thay vì OFFSET?", "a": "OFFSET lớn vẫn phải đọc+bỏ N row đầu → chậm dần. Keyset (seek): WHERE (id) > last_seen ORDER BY id FETCH NEXT n → dùng index nhảy thẳng, ổn định bất kể trang sâu.", "tags": "oracle"}, {"id": 63, "topic": "15 Clean Arch/DDD", "q": "Dependency Rule: domain layer vì sao không import spring/jpa?", "a": "Dependency chỉ hướng vào trong: domain là lõi, không phụ thuộc framework/infra. Giữ domain thuần → test được không cần Spring, đổi DB/framework không đụng business logic. Persistence là chi tiết, để ở infrastructure.", "tags": "architecture"}, {"id": 64, "topic": "15 Clean Arch/DDD", "q": "Aggregate Root: vì sao lưu cả aggregate atomically?", "a": "Aggregate là ranh giới nhất quán — invariant phải đúng sau mỗi thao tác (vd tổng giao dịch ≤ hạn mức). Lưu cả cụm trong 1 TX để giữ invariant. Aggregate quá lớn (list hàng nghìn child) → tách aggregate hoặc tham chiếu bằng id.", "tags": "architecture"}, {"id": 65, "topic": "15 Clean Arch/DDD", "q": "Value Object vs Entity, ví dụ Money/PaymentMethod?", "a": "Entity có identity riêng, đời sống dài (Account theo id). Value Object định danh bằng giá trị, immutable (Money, PaymentMethod). VO chặn trạng thái sai bằng validate trong constructor + không setter → không tồn tại Money âm / scale sai.", "tags": "architecture"}, {"id": 66, "topic": "15 Clean Arch/DDD", "q": "Vì sao repository interface ở domain layer?", "a": "Domain định nghĩa 'cần lưu/đọc gì' (interface), infrastructure hiện thực (JPA). Đảo ngược phụ thuộc → domain không biết JPA. Không trả Page<T> hay entity JPA từ domain repo (rò chi tiết infra vào domain).", "tags": "architecture"}, {"id": 67, "topic": "17 Microservices", "q": "Service discovery hoạt động thế nào khi service đổi IP?", "a": "Service đăng ký vào registry (Eureka/Consul) lúc khởi động + heartbeat. Client hỏi registry để lấy endpoint hiện tại (client-side LB) hoặc qua gateway. Restart đổi IP → đăng ký lại → instance cũ hết heartbeat bị loại.", "tags": "microservices"}, {"id": 68, "topic": "17 Microservices", "q": "API Gateway có phải SPOF? Auth nên ở gateway hay service?", "a": "Gateway có thể là SPOF → chạy nhiều instance + LB. Auth: xác thực (verify token) ở gateway để chặn sớm; nhưng authorization chi tiết theo nghiệp vụ nên ở service (gateway không biết ownership). Defense in depth: service vẫn không tin tưởng mù.", "tags": "microservices"}, {"id": 69, "topic": "17 Microservices", "q": "Sidecar pattern lợi ích và đánh đổi?", "a": "Đặt proxy (Envoy) cạnh mỗi service xử lý cross-cutting: mTLS, retry, telemetry, traffic shaping → service chỉ lo business, đồng nhất đa ngôn ngữ. Đánh đổi: thêm latency mỗi hop + độ phức tạp vận hành (service mesh).", "tags": "microservices"}, {"id": 70, "topic": "17 Microservices", "q": "CQRS dùng khi nào, rủi ro gì?", "a": "Tách model ghi (command) và đọc (query), thường read tối ưu riêng (denormalized/replica). Hợp khi read và write rất lệch nhau về tải/hình dạng. Rủi ro: phức tạp + eventual consistency giữa write và read model.", "tags": "microservices"}, {"id": 71, "topic": "19 API Design", "q": "Idempotency-key trong REST API: vì sao và cho method nào?", "a": "POST/payment không idempotent tự nhiên → client retry tạo trùng. Client gửi Idempotency-Key; server lưu key + kết quả, gặp lại trả kết quả cũ thay vì xử lý lại. GET/PUT/DELETE vốn idempotent theo HTTP.", "tags": "api"}, {"id": 72, "topic": "19 API Design", "q": "Versioning API: các cách và đánh đổi?", "a": "URL (/v1/...) dễ thấy, dễ route nhưng lộ version trong path. Header (Accept/version) sạch URL nhưng khó test/cache. Quan trọng: backward compatible (thêm field optional), tránh breaking change; chỉ bump major khi buộc phải.", "tags": "api"}, {"id": 73, "topic": "19 API Design", "q": "Cursor-based vs offset pagination?", "a": "Offset (page/limit) đơn giản nhưng chậm ở trang sâu và lệch khi data thay đổi. Cursor (token trỏ vị trí, thường theo id/timestamp) ổn định và nhanh, hợp feed/dữ liệu lớn. Nhược: không nhảy trang tùy ý.", "tags": "api"}, {"id": 74, "topic": "19 API Design", "q": "Rate limiting: thuật toán nào, khác biệt chính?", "a": "Token bucket (cho phép burst, refill đều) phổ biến; Sliding window log/counter chính xác hơn fixed window (tránh dồn ở ranh giới cửa sổ). Lưu state ở Redis cho multi-instance. Trả 429 + Retry-After.", "tags": "api"}, {"id": 75, "topic": "20 Kafka", "q": "Partition key quyết định gì? Hệ quả nếu null?", "a": "Key → hash → partition; cùng key vào cùng partition → giữ thứ tự theo key (vd theo accountId). Key null → round-robin, mất đảm bảo thứ tự. Thứ tự chỉ đảm bảo TRONG 1 partition, không toàn topic.", "tags": "kafka"}, {"id": 76, "topic": "20 Kafka", "q": "Consumer group + rebalancing là gì?", "a": "Mỗi partition được gán cho đúng 1 consumer trong group → scale bằng thêm consumer (tối đa = số partition). Thêm/mất consumer → rebalance (gán lại partition), trong lúc đó tạm dừng tiêu thụ. Quá nhiều rebalance = bất ổn (tune session.timeout, dùng cooperative).", "tags": "kafka"}, {"id": 77, "topic": "20 Kafka", "q": "Đảm bảo không xử lý trùng khi consumer crash sau xử lý trước khi commit offset?", "a": "Kafka at-least-once → có thể nhận lại. Idempotent consumer: lưu eventId đã xử lý, gặp lại skip; hoặc commit offset + side-effect trong cùng TX (transactional outbox phía consumer). Manual ack sau khi xử lý xong.", "tags": "kafka"}, {"id": 78, "topic": "20 Kafka", "q": "Tránh blocking consumer khi xử lý nặng (vd render 5 phút)?", "a": "Không xử lý nặng trong listener (giữ partition, gây rebalance). Listener chỉ enqueue job (DB/queue) + ack nhanh; worker pool xử lý nền. Việc nặng tách khỏi vòng poll.", "tags": "kafka"}, {"id": 79, "topic": "22 Resilience", "q": "Circuit breaker 3 trạng thái hoạt động ra sao?", "a": "CLOSED (cho qua, đếm lỗi) → vượt ngưỡng → OPEN (fail nhanh, không gọi downstream) → sau thời gian chờ → HALF_OPEN (thử vài request) → ok thì CLOSED, lỗi thì OPEN lại. Bảo vệ không dội service đang chết + giải phóng thread.", "tags": "resilience"}, {"id": 80, "topic": "22 Resilience", "q": "Retry đúng cách cần gì, vì sao cần jitter?", "a": "Phân loại lỗi trước (chỉ retry transient: timeout, 503; KHÔNG retry 400/business). Exponential backoff + jitter (ngẫu nhiên hoá) để tránh thundering herd — nhiều client retry đồng loạt làm service vừa hồi lại sập. Giới hạn maxAttempts. Đảm bảo idempotent.", "tags": "resilience"}, {"id": 81, "topic": "22 Resilience", "q": "Bulkhead pattern là gì?", "a": "Cô lập tài nguyên (thread pool/connection) theo từng dependency để 1 cái chậm không nuốt hết thread của cả app — như khoang kín tàu thủy. Vd pool riêng cho service A và B.", "tags": "resilience"}, {"id": 82, "topic": "22 Resilience", "q": "Timeout vì sao quan trọng hơn ta nghĩ?", "a": "Không có timeout → call treo giữ thread → cạn pool → cascade failure toàn hệ thống. Phải đặt timeout < thời gian giữ thread chấp nhận được, kết hợp circuit breaker + fallback.", "tags": "resilience"}, {"id": 83, "topic": "33 Idempotency", "q": "Idempotency là gì, vì sao bắt buộc cho payment?", "a": "Xử lý 1 hay nhiều lần cho cùng kết quả/side-effect. Mạng không tin cậy → client retry, message giao trùng → nếu không idempotent sẽ trừ tiền nhiều lần. Cần cho mọi thao tác có side-effect không tự nhiên idempotent.", "tags": "idempotency"}, {"id": 84, "topic": "33 Idempotency", "q": "Cài idempotency chống race 2 request đồng thời cùng key?", "a": "INSERT bản ghi key ở trạng thái PROCESSING TRƯỚC khi xử lý; UNIQUE constraint là cổng atomic — 1 thread thắng xử lý, thread thua bắt DuplicateKey rồi đọc/đợi kết quả của winner (COMPLETED trả cache, PROCESSING trả 409).", "tags": "idempotency"}, {"id": 85, "topic": "33 Idempotency", "q": "Phân biệt lỗi retryable vs non-retryable khi lưu kết quả idempotent?", "a": "FAILED do transient (timeout, 5xx) → cho phép retry (reset PROCESSING). FAILED do business (insufficient funds, card declined) → non-retryable, trả lại lỗi cũ, không xử lý lại. Lưu cờ retryable cùng record.", "tags": "idempotency"}, {"id": 86, "topic": "33 Idempotency", "q": "Idempotency key nên do ai sinh, gắn với gì?", "a": "Do CLIENT/merchant sinh, gắn với order/đơn vị nghiệp vụ, ổn định qua các lần retry. Server tự sinh thì mỗi retry là key mới → mất tác dụng. Lưu kèm TTL hợp lý.", "tags": "idempotency"}, {"id": 87, "topic": "36 SOLID", "q": "SRP thực chất nói gì (không phải 'mỗi class 1 việc')?", "a": "Một class chỉ nên có 1 lý do để thay đổi — tức phục vụ 1 actor/stakeholder. Tách vì nguồn thay đổi khác nhau (vd tính lương vs format báo cáo vs lưu DB do 3 bộ phận khác nhau yêu cầu đổi).", "tags": "solid"}, {"id": 88, "topic": "36 SOLID", "q": "OCP đạt được bằng cơ chế nào?", "a": "Open for extension, closed for modification: thêm hành vi mới bằng thêm class (polymorphism/strategy) thay vì sửa code cũ + if/else dài. Vd thêm payment method mới = thêm implementation, không sửa switch.", "tags": "solid"}, {"id": 89, "topic": "36 SOLID", "q": "LSP bị vi phạm khi nào, ví dụ?", "a": "Khi subtype không thay thế được supertype mà không phá hành vi: Square extends Rectangle nhưng setWidth cũng đổi height → code dùng Rectangle hỏng. Hoặc override ném exception cho thao tác cha hỗ trợ.", "tags": "solid"}, {"id": 90, "topic": "36 SOLID", "q": "DIP: 'depend on abstraction' nghĩa thực tế trong Spring?", "a": "Module cấp cao và thấp đều phụ thuộc interface, không phụ thuộc implementation cụ thể. Spring DI inject interface (vd PaymentRepository) → đổi implementation không sửa service, test được bằng mock.", "tags": "solid"}, {"id": 91, "topic": "37 System Design", "q": "5 bước framework system design interview?", "a": "1) Clarify (functional + non-functional, scope). 2) Estimate capacity (QPS, storage). 3) High-level design (boxes & arrows). 4) Deep dive 1-2 vấn đề khó. 5) Summarize + trade-offs. Phân bổ ~5/5/10/15/5 phút.", "tags": "system-design"}, {"id": 92, "topic": "37 System Design", "q": "Tại sao 'think out loud' và 'clarify trước' quan trọng?", "a": "Interviewer chấm quá trình tư duy, không chỉ đáp án. Nhảy thẳng vào vẽ = giả định bừa, mất điểm. Nói giả định ra, hỏi ràng buộc (scale, consistency, SLA) trước → thể hiện senior, tránh thiết kế sai đề.", "tags": "system-design"}, {"id": 93, "topic": "37 System Design", "q": "Read-heavy vs write-heavy dẫn tới lựa chọn gì?", "a": "Read-heavy → cache (Redis) + CDN + read replica. Write-heavy → async qua queue, batch, sharding/partition, LSM-store. Luôn ước lượng tỉ lệ read:write trước khi chọn để biết tối ưu hướng nào.", "tags": "system-design"}, {"id": 94, "topic": "37 System Design", "q": "Khi nào chấp nhận eventual consistency, khi nào không?", "a": "Chấp nhận cho: lịch sử giao dịch, đếm view, feed, notification (trễ chấp nhận được). KHÔNG cho: chống thấu chi/double-spend, check trùng payment, fraud realtime — phải strong consistency tại điểm quyết định.", "tags": "system-design"}];
const LS_BOX = 'fc_box_v1';        // {id: leitnerBox}
function loadBoxes(){ try{return JSON.parse(localStorage.getItem(LS_BOX))||{};}catch(e){return {};} }
function saveBoxes(b){ try{localStorage.setItem(LS_BOX, JSON.stringify(b));}catch(e){} }

let boxes = loadBoxes();
let queue = [], idx = 0, flipped = false, curFilter = '__all';

function pool(){ return curFilter==='__all' ? CARDS : CARDS.filter(c=>c.topic===curFilter); }
function buildQueue(){
  const p = pool().slice();
  // ưu tiên thẻ box thấp (chưa thuộc) trước
  p.sort((a,b)=>((boxes[a.id]||0)-(boxes[b.id]||0)) || Math.random()-0.5);
  queue = p; idx = 0; flipped = false;
}
function shuffle(){ buildQueue(); for(let i=queue.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[queue[i],queue[j]]=[queue[j],queue[i]];} render(); }

function stats(){
  const p = pool(); const known = p.filter(c=>(boxes[c.id]||0)>=3).length;
  document.getElementById('stats').innerHTML =
    'Thẻ: '+p.length+' · Đã thuộc (box≥3): <b>'+known+'</b><br>Đang ở: '+Math.min(idx+1,queue.length)+'/'+queue.length;
  document.getElementById('pfill').style.width = (p.length? (known/p.length*100):0)+'%';
}
function esc(s){return s;}
function render(){
  stats();
  const view = document.getElementById('view');
  if(idx>=queue.length){
    view.innerHTML='<div class="done"><h2>✅ Hết lượt chủ đề này</h2><p class="sub">Bấm 🔀 Trộn để ôn lại, hoặc đổi chủ đề. Thẻ "Again" sẽ ưu tiên hiện trước lần sau.</p></div>';
    return;
  }
  const c = queue[idx]; const box = boxes[c.id]||0;
  view.innerHTML =
    '<div class="card-shell"><div class="card" id="card">'
    + '<span class="topic">'+c.topic+'</span><span class="box">box '+box+'</span>'
    + (flipped ? '<div class="a">'+c.a+'</div>' : '<div class="q">'+c.q+'</div>')
    + '<div class="hint">'+(flipped?'Tự chấm bên dưới (phím 1/2/3)':'Bấm để lật · phím Space')+'</div>'
    + '</div>'
    + '<div class="rate '+(flipped?'show':'')+'">'
    + '<button class="r-again" data-r="0">Again (1)</button>'
    + '<button class="r-good" data-r="1">Good (2)</button>'
    + '<button class="r-easy" data-r="2">Easy (3)</button>'
    + '</div></div>';
  document.getElementById('card').onclick=()=>{ if(!flipped){flipped=true;render();} };
  view.querySelectorAll('.rate button').forEach(b=>b.onclick=()=>rate(+b.dataset.r));
}
function rate(r){
  const c = queue[idx];
  let box = boxes[c.id]||0;
  if(r===0) box=1; else if(r===1) box=Math.min(box+1,5); else box=Math.min(box+2,5);
  boxes[c.id]=box; saveBoxes(boxes);
  if(r===0) queue.push(c);          // "Again" → gặp lại cuối lượt
  idx++; flipped=false; render();
}

// controls
const opts = ["01 Java Concurrency", "03 Java 8-17", "04 Java Memory Model", "05 Spring Core", "07 Spring Transaction", "08 Spring Security", "09 Spring Data JPA", "11 SQL Advanced", "13 Distributed Tx", "14 Redis", "15 Clean Arch/DDD", "17 Microservices", "19 API Design", "20 Kafka", "22 Resilience", "33 Idempotency", "36 SOLID", "37 System Design", "39 DB Consistency", "40 Oracle"];
document.getElementById('topicSel').onchange=e=>{curFilter=e.target.value;buildQueue();render();};
document.getElementById('shuffleBtn').onclick=shuffle;
document.getElementById('resetBtn').onclick=()=>{ if(confirm('Xoá toàn bộ tiến độ flashcard?')){boxes={};saveBoxes(boxes);buildQueue();render();} };
const tb=document.getElementById('themeBtn');
tb.onclick=()=>{const h=document.documentElement;const n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);tb.textContent=n==='dark'?'☀️':'🌙';try{localStorage.setItem('theme',n);}catch(e){}};
(function(){try{const s=localStorage.getItem('theme');if(s){document.documentElement.setAttribute('data-theme',s);tb.textContent=s==='dark'?'☀️':'🌙';}}catch(e){}})();
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); if(!flipped&&idx<queue.length){flipped=true;render();}}
  else if(flipped&&['1','2','3'].includes(e.key)){rate(+e.key-1);}
});
buildQueue(); render();
</script>
